      <stop offset="0%" stop-color="#0b1e32"/>
      <stop offset="50%" stop-color="#153b5d"/>
      <stop offset="100%" stop-color="#0b86d8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#ffd089" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#ffd089" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="12%" r="34%">
